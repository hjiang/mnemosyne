{{define "content"}}
    <div class="page-header">
        <h2>IMAP Accounts</h2>
        <p>Manage your email accounts for backup</p>
    </div>

    {{if .Error}}<p role="alert">{{.Error}}</p>{{end}}

    {{range .Accounts}}
    <article class="card">
        <header>
            <strong>{{.Label}}</strong>
        </header>
        <span class="account-meta"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>{{.Host}}:{{.Port}}</span>
        <div class="account-actions">
            <a href="/accounts/{{.ID}}/folders" role="button" class="outline">Manage folders</a>
            <form method="POST" action="/accounts/{{.ID}}/backup">
                <button type="submit" class="outline">Backup now</button>
            </form>
        </div>
    </article>
    {{end}}

    <div class="form-section">
        <h3>Add account</h3>
        <form method="POST" action="/accounts">
            <div class="form-grid">
                <label class="full-width">Label
                    <input type="text" name="label" placeholder="e.g. Work Gmail" required>
                </label>
                <label>Host
                    <input type="text" name="host" placeholder="imap.gmail.com" required>
                </label>
                <label>Port
                    <input type="number" name="port" value="993" required>
                </label>
                <label>Username
                    <input type="text" name="username" placeholder="you@example.com" required>
                </label>
                <label>Password
                    <input type="password" name="password" required>
                </label>
                <label class="full-width">
                    <input type="checkbox" name="use_tls" checked> Use TLS
                </label>
            </div>
            <details>
                <summary>SOCKS5 Proxy (optional)</summary>
                <div class="form-grid">
                    <label>Proxy Host
                        <input type="text" name="proxy_host" placeholder="127.0.0.1">
                    </label>
                    <label>Proxy Port
                        <input type="number" name="proxy_port" placeholder="1080">
                    </label>
                    <label>Proxy Username
                        <input type="text" name="proxy_username" placeholder="(optional)">
                    </label>
                    <label>Proxy Password
                        <input type="password" name="proxy_password" placeholder="(optional)">
                    </label>
                </div>
            </details>
            <button type="submit">Add account</button>
        </form>
    </div>
{{end}}
