<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mnemosyne</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js" defer></script>
</head>
<body>
<main class="container">
    <nav>
        <ul><li><strong class="brand"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Mnemosyne</strong></li></ul>
        <ul>
            <li><a href="/search">Search</a></li>
            <li><a href="/accounts">Accounts</a></li>
            <li><a href="/backups">Backups</a></li>
            <li><span class="text-muted">{{.Email}}</span></li>
            <li><form method="POST" action="/logout"><button type="submit" class="outline secondary">Log out</button></form></li>
        </ul>
    </nav>

    <div class="page-header">
        <h2>Dashboard</h2>
    </div>

    <form action="/search" method="GET" role="search" class="search-box">
        <input type="search" name="q" placeholder="Search your email... (e.g. from:alice has:attachment budget)">
        <button type="submit">Search</button>
    </form>

    {{if .Accounts}}
    <h3>Accounts</h3>
    {{range .Accounts}}
    <article class="card">
        <header>
            <strong>{{.Label}}</strong>
        </header>
        <span class="account-meta"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>{{.Host}}:{{.Port}} &middot; {{.Username}}</span>
        <div class="account-actions">
            <a href="/accounts/{{.ID}}/folders" role="button" class="outline">Folders</a>
            <form method="POST" action="/accounts/{{.ID}}/backup">
                <button type="submit" class="outline">Backup now</button>
            </form>
        </div>
    </article>
    {{end}}
    {{else}}
    <div class="empty-state">
        <p>No IMAP accounts configured yet.</p>
        <a href="/accounts" role="button">Add an account</a>
    </div>
    {{end}}
</main>
</body>
</html>
